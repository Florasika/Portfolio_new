<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tous mes projets - Flora</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Flora</a>
            <button id="mobile-menu-toggle" class="mobile-menu-btn" aria-label="Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="nav-links desktop-only">
                <a href="index.html#services">Services</a>
                <a href="portfolio.html" style="color: #f472b6;">Portfolio</a>
                <a href="index.html#about">À propos</a>
                <a href="index.html#contact" class="btn btn-primary glow-pink btn-sm">Contact</a>
            </div>
        </div>
    </nav>

    <section class="section-header container">
        <div class="badge mb-6 mx-auto">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                class="mr-1">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            Mes Travaux
        </div>

        <h1 class="hero-title text-center">
            Mon <span class="text-gradient">Portfolio</span>
        </h1>

        <p class="section-subtitle text-center mx-auto">
            Découvrez l'ensemble de mes réalisations en Design UI/UX, <br class="desktop-only">
            Développement Front-End, WordPress et Data.
        </p>
    </section>

    <section class="portfolio-section container" style="padding-top: 2rem;">

        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">Tous</button>
            <button class="filter-btn" data-filter="figma">UX/UI</button>
            <button class="filter-btn" data-filter="wordpress">WordPress</button>
            <button class="filter-btn" data-filter="data">Data</button>
            <button class="filter-btn" data-filter="dev">Développement</button>
        </div>

        <div id="portfolio-grid-full" class="grid-3"></div>
    </section>

    <div id="project-modal" class="modal" style="display: none;">
        <div class="modal-content card bg-gradient-dark">
            <button class="close-modal" aria-label="Fermer">&times;</button>
            <div id="modal-body">
            </div>
        </div>

    <footer class="footer border-t mt-12">
        <div class="container flex-between align-center mobile-col">
            <div class="footer-info">
                <h3>Flora NOUDOUKOU</h3>
                <p>Designer UI/UX & Développeuse Front-End</p>
            </div>
            <div class="footer-links">
                <a href="index.html">Accueil</a>
                <a href="portfolio.html">Portfolio</a>
            </div>
        </div>
    </footer>



    <script src="script.js"></script>
